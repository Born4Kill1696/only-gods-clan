<!DOCTYPE html>
<html>
<head>
<title>Only么Gods Clan Name Generator</title>
<style>
body {
  background: black;
  color: white;
  text-align: center;
  font-family: Arial;
}
input {
  padding: 10px;
  font-size: 18px;
  margin-top: 20px;
}
.result {
  margin-top: 20px;
  font-size: 28px;
}
</style>
</head>
<body>

<h1>Only么Gods Clan Name Generator</h1>

<input id="name" placeholder="Enter your name" oninput="generate()">

<div class="result" id="output"></div>

<script>
function convertToBoldUnicode(str) {
    const normal = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789";
    const bold = "𝐀𝐁𝐂𝐃𝐄𝐅𝐆𝐇𝐈𝐉𝐊𝐋𝐌𝐍𝐎𝐏𝐐𝐑𝐒𝐓𝐔𝐕𝐖𝐗𝐘𝐙" +
                 "𝐚𝐛𝐜𝐝𝐞𝐟𝐠𝐡𝐢𝐣𝐤𝐥𝐦𝐧𝐨𝐩𝐪𝐫𝐬𝐭𝐮𝐯𝐰𝐱𝐲𝐳" +
                 "𝟎𝟏𝟐𝟑𝟒𝟓𝟔𝟕𝟖𝟗";

    return str.split('').map(c => {
        let i = normal.indexOf(c);
        return i !== -1 ? bold[i] : c;
    }).join('');
}

function generate() {
    let name = document.getElementById("name").value;
    let result = "OG么" + name;
    document.getElementById("output").innerText = convertToBoldUnicode(result);
}
</script>

</body>
</html>
